<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer E-Commerce Storefront</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState(null);
            const [apiUrl, setApiUrl] = useState(localStorage.getItem('ECOM_API_URL') || 'http://localhost:3000');
            const [showSettings, setShowSettings] = useState(false);

            const handleCheckout = async () => {
                setLoading(true);
                setStatus(null);

                try {
                    const response = await fetch(`${apiUrl}/api/payment/pay`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            orderId: 'ORD-5052',
                            amount: 149.99,
                            walletId: null // THIS CAUSES THE CRASH!
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error);
                    setStatus({ type: 'success', message: 'Payment Successful!' });
                } catch (err) {
                    console.error("CRASH DETECTED:", err.message);
                    setStatus({ type: 'error', message: 'Transaction Failed: System Error.' });
                    
                    // The backend automatically pushes the crash to your SUMMA dashboard!
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen font-sans text-slate-900 bg-white">
                    {/* Header */}
                    <nav className="border-b border-slate-100 px-8 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setShowSettings(!showSettings)}>
                             <div className="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                                 <div className="w-4 h-4 bg-white rounded-full"></div>
                             </div>
                             <span className="font-bold text-xl tracking-tight">ECOM <span className="text-slate-400">STORE</span></span>
                        </div>
                        <div className="flex gap-6 text-sm font-semibold text-slate-500">
                             <a href="#" className="hover:text-black">Products</a>
                             <a href="#" className="hover:text-black">Cart (1)</a>
                             <a href="#" className="hover:text-black">Profile</a>
                        </div>
                    </nav>

                    {/* Settings Modal (Hidden by default, click logo to show) */}
                    {showSettings && (
                        <div className="bg-slate-900 text-white p-6 sticky top-20 z-40 mx-8 rounded-2xl shadow-2xl border border-slate-700 animate-in fade-in slide-in-from-top-4 duration-300">
                            <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                ⚙️ Developer Settings
                            </h3>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold uppercase text-slate-400 mb-2">Backend API URL (Localtunnel/Render)</label>
                                    <input 
                                        type="text" 
                                        value={apiUrl}
                                        onChange={(e) => {
                                            setApiUrl(e.target.value);
                                            localStorage.setItem('ECOM_API_URL', e.target.value);
                                        }}
                                        className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500"
                                        placeholder="https://your-api.loca.lt"
                                    />
                                </div>
                                <p className="text-xs text-slate-400">
                                    Click the logo again to close. Setting a public URL (like Localtunnel) allows this hosted site to reach your laptop's backend.
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Content */}
                    <main className="max-w-6xl mx-auto p-12">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-16 items-start">
                            
                            {/* Product Image Panel */}
                            <div className="space-y-4">
                                <div className="aspect-square bg-slate-50 rounded-3xl p-12 flex items-center justify-center border border-slate-100 overflow-hidden group">
                                     <img 
                                        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=600" 
                                        alt="Sneakers" 
                                        className="w-full mix-blend-multiply transition-transform duration-500 group-hover:scale-110"
                                     />
                                </div>
                                <div className="grid grid-cols-4 gap-4">
                                     {[1,2,3,4].map(i => (
                                         <div key={i} className="aspect-square bg-slate-50 rounded-xl border border-slate-100"></div>
                                     ))}
                                </div>
                            </div>

                            {/* Checkout Panel */}
                            <div className="py-2">
                                <span className="text-sm font-bold tracking-widest uppercase text-slate-400">Exclusive Drop</span>
                                <h1 className="text-5xl font-extrabold text-slate-900 mb-4 tracking-tight mt-2">Elite Series<br/>Cloud Runners</h1>
                                <div className="flex items-baseline gap-2 mb-8">
                                     <span className="text-3xl font-bold">$149.99</span>
                                     <span className="text-slate-400 line-through">$199.99</span>
                                </div>
                                <p className="text-slate-500 leading-relaxed mb-10 text-lg">
                                    Experience the future of comfort. Engineered for performance, designed for the streets. 
                                    The Elite Series features carbon-fiber technology and ultra-breathable mesh.
                                </p>

                                <div className="space-y-6 pt-6 border-t border-slate-100">
                                    <div className="flex justify-between items-center">
                                        <span className="font-semibold">Size</span>
                                        <span className="text-slate-400">Size Guide</span>
                                    </div>
                                    <div className="grid grid-cols-4 gap-2">
                                        {[8, 9, 10, 11].map(sz => (
                                            <button key={sz} className={`py-3 rounded-xl font-bold border ${sz === 10 ? 'border-black bg-black text-white' : 'border-slate-200 text-slate-900 hover:border-black'}`}>
                                                {sz}
                                            </button>
                                        ))}
                                    </div>

                                    <button 
                                        onClick={handleCheckout}
                                        disabled={loading}
                                        className="w-full bg-black text-white py-5 rounded-2xl font-bold text-lg shadow-2xl shadow-indigo-200 hover:bg-slate-800 transition-all flex justify-center items-center gap-3 relative overflow-hidden"
                                    >
                                        {loading ? (
                                            <div className="w-6 h-6 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
                                        ) : (
                                            'Confirm & Pay Now'
                                        )}
                                        <div className={`absolute inset-0 bg-white/10 transition-transform ${loading ? 'translate-x-0' : '-translate-x-full'}`}></div>
                                    </button>

                                    {status && (
                                        <div className={`p-4 rounded-xl font-medium text-center animate-bounce ${status.type === 'success' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                            {status.message}
                                        </div>
                                    )}

                                    <p className="text-center text-slate-400 text-xs mt-4">
                                        Secure payment powered by Stripe. All transactions are encrypted.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
